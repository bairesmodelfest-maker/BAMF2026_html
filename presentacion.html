<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAMF 2026 — Presentación de Ganadores</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Segoe UI',sans-serif}

  /* FONDO */
  #bg-img{position:fixed;inset:0;background-size:cover;background-position:center;opacity:0;transition:opacity 1.4s ease;filter:blur(12px) brightness(.25) saturate(1.5);z-index:0}

  /* PARTÍCULAS */
  #bg-particles{position:fixed;inset:0;pointer-events:none;z-index:1}

  /* FLASH */
  #flash{position:fixed;inset:0;background:#fff;opacity:0;z-index:50;pointer-events:none;transition:opacity .2s}

  /* ── INTRO ── */
  #intro{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000}
  .intro-logo{font-size:5em;margin-bottom:10px;opacity:0;transition:all 1s ease}
  .intro-logo.show{opacity:1}
  .intro-title{color:#DAA070;font-size:3.5em;font-weight:900;letter-spacing:.15em;text-align:center;text-shadow:0 0 40px rgba(218,160,112,.6);opacity:0;transform:scale(.85);transition:all 1.2s ease}
  .intro-title.show{opacity:1;transform:scale(1)}
  .intro-sub{color:#7EABC0;font-size:1.1em;margin-top:12px;letter-spacing:.25em;opacity:0;transition:all .8s ease .5s;text-transform:uppercase}
  .intro-sub.show{opacity:1}
  .intro-btn{margin-top:50px;background:transparent;border:2px solid #DAA070;color:#DAA070;padding:14px 50px;font-size:1.1em;font-weight:900;letter-spacing:.12em;border-radius:8px;cursor:pointer;opacity:0;transition:all .8s ease 1s;text-transform:uppercase}
  .intro-btn.show{opacity:1}
  .intro-btn:hover{background:#DAA070;color:#0a0a0a}

  /* ── SLIDE CATEGORÍA ── */
  #slide{position:fixed;inset:0;z-index:10;display:none;align-items:center;justify-content:center;gap:0}

  /* Foto — mitad izquierda */
  #slide-foto-wrap{flex:0 0 50%;height:100vh;overflow:hidden;position:relative}
  #slide-foto-wrap img{width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity 1s ease}
  #slide-foto-wrap img.visible{opacity:1}
  #slide-foto-wrap .no-foto{width:100%;height:100%;background:#0f1a2a;display:flex;align-items:center;justify-content:center;font-size:6em;color:#1C3156}
  /* Gradiente sobre la foto para fundir con el lado derecho */
  #slide-foto-wrap::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent 60%,#000 100%);pointer-events:none}

  /* Datos — mitad derecha */
  #slide-datos-wrap{flex:0 0 50%;height:100vh;display:flex;flex-direction:column;justify-content:center;padding:60px 70px 60px 40px;position:relative;z-index:2}

  /* Elementos del slide */
  .sl-titulo-badge{
    display:inline-block;
    background:linear-gradient(135deg,#DAA070,#8B4513);
    color:#fff;
    font-size:1.05em;
    font-weight:900;
    letter-spacing:.08em;
    text-transform:uppercase;
    padding:12px 28px;
    border-radius:8px;
    box-shadow:0 0 30px rgba(218,160,112,.5);
    margin-bottom:28px;
    opacity:0;transform:translateY(-20px);transition:all .6s ease .2s
  }
  .sl-titulo-badge.in{opacity:1;transform:translateY(0)}

  .sl-cat{
    font-size:2em;
    font-weight:900;
    color:#DAA070;
    line-height:1.1;
    margin-bottom:8px;
    opacity:0;transform:translateY(-15px);transition:all .6s ease .4s
  }
  .sl-cat.in{opacity:1;transform:translateY(0)}

  .sl-sep{
    width:70px;height:3px;
    background:linear-gradient(90deg,#DAA070,transparent);
    border-radius:2px;margin:24px 0;
    opacity:0;transition:all .5s ease .6s
  }
  .sl-sep.in{opacity:1}

  .sl-modelo{
    font-size:1.8em;
    font-weight:700;
    color:#fff;
    line-height:1.2;
    margin-bottom:20px;
    font-style:italic;
    opacity:0;transform:translateX(-20px);transition:all .6s ease .7s
  }
  .sl-modelo.in{opacity:1;transform:translateX(0)}

  .sl-modelista{
    font-size:2.4em;
    font-weight:900;
    color:#DAA070;
    line-height:1.1;
    opacity:0;transform:translateX(-20px);transition:all .6s ease .9s
  }
  .sl-modelista.in{opacity:1;transform:translateX(0)}

  /* ── SLIDE FINAL ── */
  #slide-final{
    position:fixed;inset:0;z-index:10;
    display:none;flex-direction:column;
    align-items:center;justify-content:center;
    text-align:center;padding:40px;gap:0
  }

  .fn-corona{font-size:5em;opacity:0}
  .fn-titulo{
    font-size:1.3em;font-weight:900;letter-spacing:.35em;
    text-transform:uppercase;color:#DAA070;
    text-shadow:0 0 30px rgba(218,160,112,.8);
    margin:16px 0 30px;opacity:0
  }
  .fn-foto{
    width:320px;height:360px;border-radius:16px;overflow:hidden;
    box-shadow:0 0 100px rgba(218,160,112,.6);
    border:3px solid rgba(218,160,112,.7);
    margin-bottom:28px;opacity:0
  }
  .fn-foto img{width:100%;height:100%;object-fit:cover}
  .fn-modelo{
    font-size:2.4em;font-weight:900;color:#fff;
    text-shadow:0 0 40px rgba(218,160,112,.6);
    margin-bottom:10px;opacity:0;font-style:italic
  }
  .fn-modelista{
    font-size:2em;font-weight:900;color:#DAA070;
    text-shadow:0 0 30px rgba(218,160,112,.8);
    opacity:0
  }

  @keyframes fadeUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
  @keyframes pulse{0%,100%{text-shadow:0 0 30px rgba(218,160,112,.5)}50%{text-shadow:0 0 80px rgba(218,160,112,1),0 0 120px rgba(218,160,112,.5)}}
  @keyframes coronaPulse{0%,100%{transform:scale(1) rotate(-5deg)}50%{transform:scale(1.15) rotate(5deg)}}

  /* CONTROLES */
  #controls{position:fixed;bottom:24px;right:24px;z-index:200;display:flex;gap:10px;opacity:.2;transition:opacity .3s}
  #controls:hover{opacity:1}
  #controls button{background:rgba(10,10,10,.9);border:1px solid #DAA070;color:#DAA070;padding:10px 18px;border-radius:8px;cursor:pointer;font-size:.85em;font-weight:bold;letter-spacing:.05em}
  #controls button:hover{background:#DAA070;color:#0a0a0a}
  #slide-counter{position:fixed;top:20px;right:24px;z-index:200;color:rgba(218,160,112,.4);font-size:.78em;letter-spacing:.12em}
</style>
</head>
<body>

<div id="bg-img"></div>
<canvas id="bg-particles"></canvas>
<div id="flash"></div>

<!-- INTRO -->
<div id="intro">
  <div class="intro-logo" id="i-logo">🏆</div>
  <div class="intro-title" id="i-title">BAMF 2026</div>
  <div class="intro-sub" id="i-sub">Baires Modelfest · Ganadores</div>
  <button class="intro-btn" id="i-btn" onclick="iniciarPresentacion()">▶ Iniciar Presentación</button>
</div>

<!-- SLIDE CATEGORÍA -->
<div id="slide">
  <div id="slide-foto-wrap"></div>
  <div id="slide-datos-wrap"></div>
</div>

<!-- SLIDE FINAL -->
<div id="slide-final">
  <div class="fn-corona" id="fn-corona">🏆</div>
  <div class="fn-titulo" id="fn-titulo">MEJOR DEL CONCURSO</div>
  <div class="fn-foto" id="fn-foto"></div>
  <div class="fn-modelo" id="fn-modelo"></div>
  <div class="fn-modelista" id="fn-modelista"></div>
</div>

<!-- CONTROLES -->
<div id="controls">
  <button onclick="anteriorSlide()">← Anterior</button>
  <button onclick="siguienteSlide()">Siguiente →</button>
  <button onclick="salir()">✕ Salir</button>
</div>
<div id="slide-counter"></div>

<script>
var CL_CLOUD  = "dgcyeqydo";
var CL_FOLDER = "bamf2026";
var slides    = [];
var idxActual = 0;

// ── SANITIZAR (igual que la app de fotos) ──
function sanitizar(str){
  return String(str||"")
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/[ñ]/g,"n").replace(/[Ñ]/g,"N")
    .replace(/[\\/:*?"<>|]/g,"")
    .replace(/\s+/g," ").trim();
}
function padNum(n,d){ return String(parseInt(n)||0).padStart(d,"0"); }

function urlFoto(orden, modelo){
  var num=padNum(orden,3);
  var nombre=sanitizar(modelo);
  // El nombre del archivo es "003 Spitfire MkI"
  var publicId=CL_FOLDER+"/"+num+" "+nombre;
  return "https://res.cloudinary.com/"+CL_CLOUD+"/image/upload/"+encodeURIComponent(publicId)+".jpg";
}

// ── CLASIFICACIÓN ──
function pCls(p){
  var s=String(p||"").toLowerCase();
  if(s.indexOf("primer")>=0||s==="1"||s.indexOf("1°")>=0||s.indexOf("1er")>=0) return "p1";
  if(s.indexOf("segundo")>=0||s==="2"||s.indexOf("2°")>=0||s.indexOf("2do")>=0) return "p2";
  if(s.indexOf("tercer")>=0||s==="3"||s.indexOf("3°")>=0||s.indexOf("3er")>=0) return "p3";
  return "p0";
}

// ── CARGAR DATOS DESDE CLOUDINARY ──
function cargarDatos(){
  var t=Date.now();
  // Probar primero como raw, luego como image
  var urls=[
    "https://res.cloudinary.com/dgcyeqydo/raw/upload/bamf2026/presentacion_data.json?t="+t,
    "https://res.cloudinary.com/dgcyeqydo/raw/upload/bamf2026/presentacion_data?t="+t,
    "https://res.cloudinary.com/dgcyeqydo/image/upload/bamf2026/presentacion_data.json?t="+t,
  ];
  function tryNext(i){
    if(i>=urls.length) return Promise.reject(new Error("Sin datos"));
    return fetch(urls[i]).then(function(r){
      if(!r.ok) return tryNext(i+1);
      return r.json().catch(function(){ return tryNext(i+1); });
    }).catch(function(){ return tryNext(i+1); });
  }
  return tryNext(0);
}

// ── CONSTRUIR SLIDES ──
function construirSlides(data){
  // Mejor de cada categoría = mayor CALIFICACIÓN FINAL con premio != p0
  var porCat={};
  data.forEach(function(r){
    if(pCls(r["PREMIO SUGERIDO"])==="p0") return;
    var cat=(r["Categoría"]||"Sin categoría").trim();
    var cal=parseFloat(r["CALIFICACIÓN FINAL"])||0;
    if(!porCat[cat]||cal>porCat[cat].cal){
      porCat[cat]={r:r,cal:cal};
    }
  });

  // Ordenar categorías alfabéticamente
  Object.keys(porCat).sort().forEach(function(cat){
    slides.push({tipo:"cat",cat:cat,entry:porCat[cat]});
  });

  // Mejor del concurso
  var conPremio=data.filter(function(r){ return pCls(r["PREMIO SUGERIDO"])!=="p0"; });
  conPremio.sort(function(a,b){ return (parseFloat(b["CALIFICACIÓN FINAL"])||0)-(parseFloat(a["CALIFICACIÓN FINAL"])||0); });
  if(conPremio.length>0){
    slides.push({tipo:"final",entry:{r:conPremio[0],cal:parseFloat(conPremio[0]["CALIFICACIÓN FINAL"])||0}});
  }
}

// ── PARTÍCULAS ──
function initParticles(){
  var c=document.getElementById("bg-particles");
  var ctx=c.getContext("2d");
  c.width=window.innerWidth; c.height=window.innerHeight;
  var ps=[];
  for(var i=0;i<60;i++) ps.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.5+.3,dx:(Math.random()-.5)*.25,dy:(Math.random()-.5)*.25,a:Math.random()*.6+.1});
  (function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    ps.forEach(function(p){
      p.x+=p.dx; p.y+=p.dy;
      if(p.x<0)p.x=c.width; if(p.x>c.width)p.x=0;
      if(p.y<0)p.y=c.height; if(p.y>c.height)p.y=0;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle="rgba(218,160,112,"+p.a+")"; ctx.fill();
    });
    requestAnimationFrame(draw);
  })();
}

// ── INTRO ──
window.addEventListener("load",function(){
  initParticles();
  setTimeout(function(){ document.getElementById("i-logo").classList.add("show"); },200);
  setTimeout(function(){ document.getElementById("i-title").classList.add("show"); },500);
  setTimeout(function(){ document.getElementById("i-sub").classList.add("show"); },900);
  setTimeout(function(){ document.getElementById("i-btn").classList.add("show"); },1200);

  document.getElementById("i-sub").textContent="Cargando datos...";

  cargarDatos().then(function(data){
    if(!data||!data.length){
      document.getElementById("i-sub").textContent="⚠️ Sin datos — presioná el botón en el dashboard primero";
      return;
    }
    construirSlides(data);
    var nCat=slides.filter(function(s){return s.tipo==="cat";}).length;
    document.getElementById("i-sub").textContent=nCat+" categorías · Gran final: Mejor del Concurso";
  }).catch(function(){
    document.getElementById("i-sub").textContent="⚠️ Sin datos — presioná el botón en el dashboard primero";
  });
});

function iniciarPresentacion(){
  if(!slides.length){ alert("Sin datos."); return; }
  document.getElementById("intro").style.display="none";
  mostrarSlide(0);
}

// ── MOSTRAR SLIDE ──
function mostrarSlide(idx){
  idxActual=idx;
  document.getElementById("slide-counter").textContent=(idx+1)+" / "+slides.length;
  var flash=document.getElementById("flash");
  flash.style.opacity=".5";
  setTimeout(function(){ flash.style.opacity="0"; },200);
  var s=slides[idx];
  if(s.tipo==="final") mostrarFinal(s.entry);
  else mostrarCat(s.entry,s.cat);
}

// ── SLIDE CATEGORÍA ──
function mostrarCat(entry,cat){
  document.getElementById("slide-final").style.display="none";
  document.getElementById("slide").style.display="flex";

  var r=entry.r;
  var orden=r["Orden de Participación"]||"";
  var modelo=r["Nombre del modelo"]||r["Nombre del Modelo"]||"";
  var modelista=r["Nombre y Apellido"]||"";

  // Fondo difuminado
  var fotoUrl=urlFoto(orden,modelo);
  var bg=document.getElementById("bg-img");
  bg.style.backgroundImage="url("+fotoUrl+")";
  bg.style.filter="blur(12px) brightness(.25) saturate(1.5)";
  setTimeout(function(){ bg.style.opacity="1"; },50);

  // Foto izquierda
  var fw=document.getElementById("slide-foto-wrap");
  fw.innerHTML="";
  var img=document.createElement("img");
  img.src=fotoUrl;
  img.onerror=function(){ fw.innerHTML='<div class="no-foto">📷</div>'; };
  img.onload=function(){ setTimeout(function(){ img.classList.add("visible"); },100); };
  fw.appendChild(img);

  // Datos derecha
  var dw=document.getElementById("slide-datos-wrap");
  dw.innerHTML=
    '<div class="sl-titulo-badge">Mejor trabajo Categoría:</div>'
    +'<div class="sl-cat">'+cat+'</div>'
    +'<div class="sl-sep"></div>'
    +'<div class="sl-modelo">'+modelo+'</div>'
    +'<div class="sl-modelista">'+modelista+'</div>';

  // Animar
  setTimeout(function(){
    dw.querySelectorAll(".sl-titulo-badge,.sl-cat,.sl-sep,.sl-modelo,.sl-modelista").forEach(function(el){
      el.classList.add("in");
    });
  },200);
}

// ── SLIDE FINAL ──
function mostrarFinal(entry){
  document.getElementById("slide").style.display="none";
  document.getElementById("slide-final").style.display="flex";

  var r=entry.r;
  var orden=r["Orden de Participación"]||"";
  var modelo=r["Nombre del modelo"]||r["Nombre del Modelo"]||"";
  var modelista=r["Nombre y Apellido"]||"";
  var fotoUrl=urlFoto(orden,modelo);

  // Fondo
  var bg=document.getElementById("bg-img");
  bg.style.backgroundImage="url("+fotoUrl+")";
  bg.style.filter="blur(6px) brightness(.15) saturate(2)";
  bg.style.opacity="1";

  // Reset
  ["fn-corona","fn-titulo","fn-foto","fn-modelo","fn-modelista"].forEach(function(id){
    var el=document.getElementById(id);
    el.style.opacity="0";
    el.style.animation="none";
    void el.offsetWidth; // reflow
  });

  // Foto
  var fotoEl=document.getElementById("fn-foto");
  fotoEl.innerHTML="";
  var img=document.createElement("img");
  img.src=fotoUrl;
  img.onerror=function(){ fotoEl.innerHTML='<div style="font-size:4em;padding:80px;color:#1C3156">📷</div>'; };
  fotoEl.appendChild(img);

  document.getElementById("fn-modelo").textContent=modelo;
  document.getElementById("fn-modelista").textContent=modelista;

  // Secuencia dramática
  var seq=[
    [400,  "fn-corona",    "animation:fadeUp .8s ease forwards,coronaPulse 2s ease-in-out 1s infinite"],
    [1100, "fn-titulo",    "animation:fadeUp .8s ease forwards"],
    [1800, "fn-foto",      "animation:fadeUp 1s ease forwards"],
    [2700, "fn-modelo",    "animation:fadeUp .8s ease forwards"],
    [3400, "fn-modelista", "animation:fadeUp .7s ease forwards,pulse 2s ease-in-out 1s infinite"],
  ];
  seq.forEach(function(step){
    setTimeout(function(){
      var el=document.getElementById(step[1]);
      el.style.cssText+=";"+step[2];
      el.style.opacity="1";
    },step[0]);
  });
}

// ── NAVEGACIÓN ──
function siguienteSlide(){
  if(idxActual<slides.length-1){
    document.getElementById("bg-img").style.opacity="0";
    setTimeout(function(){ mostrarSlide(idxActual+1); },500);
  }
}
function anteriorSlide(){
  if(idxActual>0){
    document.getElementById("bg-img").style.opacity="0";
    setTimeout(function(){ mostrarSlide(idxActual-1); },500);
  }
}
function salir(){
  if(confirm("¿Salir de la presentación?")) window.close();
}

document.addEventListener("keydown",function(e){
  if(e.key==="ArrowRight"||e.key==="PageDown"||e.key===" ") siguienteSlide();
  if(e.key==="ArrowLeft"||e.key==="PageUp") anteriorSlide();
  if(e.key==="Escape") salir();
  if(e.key==="f"||e.key==="F") document.documentElement.requestFullscreen&&document.documentElement.requestFullscreen();
});
</script>
</body>
</html>
