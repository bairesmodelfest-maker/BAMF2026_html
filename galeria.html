<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAMF 2026 — Galería de Fotos</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',sans-serif;background:#0a0a0a;color:#eee;min-height:100vh}
  .header{width:100%;background:#16213e;border-bottom:2px solid #DAA070;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
  .header h1{color:#DAA070;font-size:1.2em;letter-spacing:.04em}
  .header p{color:#7EABC0;font-size:.75em;margin-top:2px}
  .header-right{display:flex;align-items:center;gap:10px}
  .badge{background:#1C3156;color:#DAA070;border:1px solid #DAA070;border-radius:20px;padding:4px 12px;font-size:.8em;font-weight:bold}
  .search-box{padding:8px 14px;background:#0f1a2a;border:1px solid #4a6fa5;color:#eee;border-radius:8px;font-size:.9em;width:220px}
  .search-box::placeholder{color:#445}
  .status{text-align:center;padding:40px;color:#7EABC0;font-size:.9em}
  .status.err{color:#e53935}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;padding:20px;max-width:1400px;margin:0 auto}
  .card{background:#16213e;border:1px solid #0f3460;border-radius:10px;overflow:hidden;cursor:pointer;transition:transform .15s,border-color .15s}
  .card:hover{transform:scale(1.03);border-color:#DAA070}
  .card img{width:100%;height:170px;object-fit:cover;display:block;background:#0f1a2a}
  .card-label{padding:7px 10px;font-size:.73em;color:#DAA070;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-top:1px solid #0f3460}
  .empty{text-align:center;padding:60px 20px;color:#4a6fa5}
  .empty .icon{font-size:3em;margin-bottom:10px}

  /* Lightbox */
  .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:zoom-out;padding:20px}
  .lightbox img{max-width:95vw;max-height:82vh;border-radius:8px;box-shadow:0 0 40px rgba(218,160,112,.3);cursor:default}
  .lightbox-info{margin-top:12px;text-align:center}
  .lightbox-name{color:#DAA070;font-size:.95em;margin-bottom:10px}
  .lightbox-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .lb-btn{padding:8px 20px;border-radius:8px;font-weight:bold;font-size:.85em;cursor:pointer;text-decoration:none;border:none}
  .lb-dl{background:#DAA070;color:#1C3156}
  .lb-close{background:#333;color:#eee}
  .lb-prev,.lb-next{background:#1C3156;color:#DAA070;border:1px solid #DAA070;font-size:1.2em;padding:8px 16px}

  /* Nav botones lightbox */
  .lb-nav{position:fixed;top:50%;transform:translateY(-50%);background:rgba(28,49,86,.8);border:1px solid #DAA070;color:#DAA070;font-size:1.5em;padding:10px 14px;cursor:pointer;border-radius:8px;z-index:10000}
  .lb-nav.left{left:10px}
  .lb-nav.right{right:10px}

  .spinner{display:inline-block;width:24px;height:24px;border:3px solid #1C3156;border-top:3px solid #DAA070;border-radius:50%;animation:spin .8s linear infinite;margin-right:8px;vertical-align:middle}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>🖼️ BAMF 2026 — Galería de Fotos</h1>
    <p>Fotos del concurso — actualizá la página para ver las últimas subidas</p>
  </div>
  <div class="header-right">
    <input class="search-box" type="text" id="search" placeholder="🔍 Buscar modelo..." oninput="filtrar()">
    <span class="badge" id="badge">—</span>
  </div>
</div>

<div id="status-area" class="status"><span class="spinner"></span>Cargando fotos...</div>
<div class="grid" id="grid" style="display:none"></div>
<div class="empty" id="empty" style="display:none">
  <div class="icon">📭</div>
  <div>No hay fotos todavía</div>
</div>

<script>
var CL_CLOUD  = "dgcyeqydo";
var CL_KEY    = "242125226563199";
var CL_SECRET = "73JY6l5eQby7XErcyE2MJ4BbArfHpwmM";
var CL_FOLDER = "bamf2026";

var todasLasFotos = [];
var indiceActual  = 0;

// ── CARGAR FOTOS ──
window.addEventListener("load", function(){
  var credentials = btoa(CL_KEY+":"+CL_SECRET);
  fetch("https://api.cloudinary.com/v1_1/"+CL_CLOUD+"/resources/image?prefix="+CL_FOLDER+"/&max_results=500&type=upload",{
    headers:{"Authorization":"Basic "+credentials}
  })
  .then(function(r){
    if(!r.ok) throw new Error("HTTP "+r.status);
    return r.json();
  })
  .then(function(data){
    todasLasFotos = (data.resources||[]).sort(function(a,b){
      return a.public_id.localeCompare(b.public_id);
    });
    document.getElementById("status-area").style.display="none";
    if(todasLasFotos.length===0){
      document.getElementById("empty").style.display="block";
      return;
    }
    document.getElementById("badge").textContent=todasLasFotos.length+" fotos";
    document.getElementById("grid").style.display="grid";
    renderGrid(todasLasFotos);
  })
  .catch(function(e){
    var s=document.getElementById("status-area");
    s.className="status err";
    s.textContent="⚠️ Error al cargar: "+e.message;
  });
});

// ── RENDER GRILLA ──
function renderGrid(fotos){
  var grid=document.getElementById("grid");
  grid.innerHTML="";
  if(fotos.length===0){
    document.getElementById("empty").style.display="block";
    return;
  }
  document.getElementById("empty").style.display="none";
  fotos.forEach(function(f, idx){
    var nombre=f.public_id.replace(CL_FOLDER+"/","");
    var thumb="https://res.cloudinary.com/"+CL_CLOUD+"/image/upload/w_300,h_200,c_fill/"+f.public_id+".jpg";
    var card=document.createElement("div");
    card.className="card";
    card.innerHTML='<img src="'+thumb+'" loading="lazy" alt="'+nombre+'">'
      +'<div class="card-label">'+nombre+'</div>';
    card.onclick=function(){ abrirLightbox(idx, fotos); };
    grid.appendChild(card);
  });
}

// ── FILTRO ──
function filtrar(){
  var q=document.getElementById("search").value.toLowerCase();
  var filtradas=todasLasFotos.filter(function(f){
    return f.public_id.toLowerCase().includes(q);
  });
  document.getElementById("badge").textContent=filtradas.length+" / "+todasLasFotos.length;
  renderGrid(filtradas);
}

// ── LIGHTBOX ──
var lbEl=null;

function abrirLightbox(idx, fotos){
  if(lbEl) lbEl.remove();
  indiceActual=idx;

  lbEl=document.createElement("div");
  lbEl.className="lightbox";
  lbEl.onclick=function(e){ if(e.target===lbEl) cerrarLightbox(); };

  // Nav izquierda
  if(fotos.length>1){
    var prev=document.createElement("button");
    prev.className="lb-nav left"; prev.textContent="‹";
    prev.onclick=function(e){ e.stopPropagation(); abrirLightbox((indiceActual-1+fotos.length)%fotos.length,fotos); };
    lbEl.appendChild(prev);
    var next=document.createElement("button");
    next.className="lb-nav right"; next.textContent="›";
    next.onclick=function(e){ e.stopPropagation(); abrirLightbox((indiceActual+1)%fotos.length,fotos); };
    lbEl.appendChild(next);
  }

  var f=fotos[idx];
  var nombre=f.public_id.replace(CL_FOLDER+"/","");
  var rawUrl="https://res.cloudinary.com/"+CL_CLOUD+"/image/upload/"+f.public_id+".jpg";

  var img=document.createElement("img");
  img.src=rawUrl; img.alt=nombre;
  img.onclick=function(e){ e.stopPropagation(); };

  var info=document.createElement("div");
  info.className="lightbox-info";
  info.innerHTML='<div class="lightbox-name">'+nombre+'</div>'
    +'<div class="lightbox-btns">'
    +'<a class="lb-btn lb-dl" href="'+rawUrl+'" download="'+nombre+'.jpg" target="_blank" onclick="event.stopPropagation()">⬇️ Descargar</a>'
    +'<button class="lb-btn lb-close" onclick="cerrarLightbox()">✕ Cerrar</button>'
    +'</div>';

  lbEl.appendChild(img);
  lbEl.appendChild(info);
  document.body.appendChild(lbEl);

  // Teclado
  document.onkeydown=function(e){
    if(e.key==="Escape") cerrarLightbox();
    if(e.key==="ArrowLeft"&&fotos.length>1) abrirLightbox((indiceActual-1+fotos.length)%fotos.length,fotos);
    if(e.key==="ArrowRight"&&fotos.length>1) abrirLightbox((indiceActual+1)%fotos.length,fotos);
  };
}

function cerrarLightbox(){
  if(lbEl){ lbEl.remove(); lbEl=null; }
  document.onkeydown=null;
}
</script>
</body>
</html>
