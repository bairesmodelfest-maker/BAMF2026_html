<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BAMF 2026 — Foto Modelos</title>
<script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.19.1/umd/index.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:'Segoe UI',sans-serif;background:#0a0a0a;color:#eee;min-height:100vh;display:flex;flex-direction:column;align-items:center;}
  .header{width:100%;background:#16213e;border-bottom:2px solid #DAA070;padding:12px 16px;text-align:center}
  .header h1{color:#DAA070;font-size:1.1em;letter-spacing:.04em}
  .header p{color:#7EABC0;font-size:.72em;margin-top:2px}
  .screen{width:100%;max-width:480px;padding:16px;display:none;flex-direction:column;align-items:center;gap:14px}
  .screen.active{display:flex}
  #qr-wrap{position:relative;width:100%;max-width:340px;border-radius:12px;overflow:hidden;border:2px solid #DAA070;background:#000}
  #qr-video{width:100%;display:block}
  .qr-frame{position:absolute;inset:0;pointer-events:none}
  .qr-corner{position:absolute;width:28px;height:28px;border-color:#DAA070;border-style:solid}
  .qr-corner.tl{top:10px;left:10px;border-width:3px 0 0 3px;border-radius:4px 0 0 0}
  .qr-corner.tr{top:10px;right:10px;border-width:3px 3px 0 0;border-radius:0 4px 0 0}
  .qr-corner.bl{bottom:10px;left:10px;border-width:0 0 3px 3px;border-radius:0 0 0 4px}
  .qr-corner.br{bottom:10px;right:10px;border-width:0 3px 3px 0;border-radius:0 0 4px 0}
  .scan-line{position:absolute;left:12px;right:12px;height:2px;background:linear-gradient(90deg,transparent,#DAA070,transparent);animation:scan 2s ease-in-out infinite}
  @keyframes scan{0%{top:15%}50%{top:80%}100%{top:15%}}
  .scan-hint{color:#7EABC0;font-size:.8em;text-align:center}
  .card{width:100%;background:#16213e;border:2px solid #DAA070;border-radius:12px;padding:16px;text-align:center}
  .card .num{font-size:2.8em;font-weight:900;color:#DAA070;line-height:1}
  .card .mod{font-size:1em;color:#fff;margin-top:6px;font-style:italic;word-break:break-word}
  .card .fname{font-size:.72em;color:#4caf50;margin-top:10px;font-family:monospace;word-break:break-all;background:#0a1a0a;padding:6px 10px;border-radius:6px}
  #foto-preview{width:100%;max-width:340px;border-radius:10px;border:2px solid #4caf50;display:none}
  .btn{width:100%;padding:14px;border:none;border-radius:10px;font-size:1em;font-weight:700;cursor:pointer;transition:filter .15s,transform .1s;letter-spacing:.03em}
  .btn:active{transform:scale(.97)}
  .btn-gold{background:#DAA070;color:#1C3156}
  .btn-green{background:#2e7d32;color:#fff}
  .btn-blue{background:#1565c0;color:#fff}
  .btn-gray{background:#333;color:#aaa}
  .btn:disabled{background:#2a2a2a;color:#555;cursor:not-allowed}
  .status{font-size:.78em;color:#7EABC0;text-align:center;min-height:1.2em;padding:0 8px}
  .status.ok{color:#4caf50}
  .status.err{color:#e53935}
  .status.uploading{color:#DAA070}
  .counter{font-size:.75em;color:#555;text-align:center}
  .counter span{color:#DAA070;font-weight:bold}
  .manual-row{width:100%;display:flex;gap:8px}
  .manual-row input{flex:1;padding:10px;background:#0f1a2a;border:1px solid #4a6fa5;color:#eee;border-radius:8px;font-size:.9em}
  .manual-row input::placeholder{color:#445}
  .manual-row button{padding:10px 14px;background:#DAA070;color:#1C3156;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:.9em}
  .divider{width:100%;border:none;border-top:1px solid #1a2a4a}
  .section-title{font-size:.7em;text-transform:uppercase;letter-spacing:.1em;color:#4a6fa5;align-self:flex-start}
  .progress{width:100%;background:#1a2a4a;border-radius:6px;height:6px;overflow:hidden;display:none}
  .progress-bar{height:100%;background:#DAA070;width:0%;transition:width .3s}
</style>
</head>
<body>

<div class="header">
  <h1>📷 BAMF 2026 — Foto Modelos</h1>
  <p>Escaneá el QR del padrón y tomá la foto</p>
</div>

<div class="screen active" id="screen-scan">
  <div id="qr-wrap">
    <video id="qr-video" autoplay playsinline muted></video>
    <div class="qr-frame">
      <div class="qr-corner tl"></div>
      <div class="qr-corner tr"></div>
      <div class="qr-corner bl"></div>
      <div class="qr-corner br"></div>
      <div class="scan-line"></div>
    </div>
  </div>
  <p class="scan-hint">Apuntá la cámara al QR del padrón</p>
  <div class="status" id="scan-status">Iniciando cámara...</div>
  <div id="scan-ya" style="font-size:.72em;color:#4a6fa5;text-align:center;min-height:1em"></div>
  <hr class="divider">
  <p class="section-title">O ingresá manualmente</p>
  <div class="manual-row">
    <input type="number" id="inp-ord" placeholder="N° orden" min="1" max="9999">
    <input type="text"   id="inp-mod" placeholder="Nombre del modelo">
    <button onclick="ingresarManual()">OK</button>
  </div>
</div>

<div class="screen" id="screen-foto">
  <div class="card">
    <div class="num" id="disp-num">—</div>
    <div class="mod" id="disp-mod">—</div>
    <div class="fname" id="disp-fname">—</div>
  </div>
  <div id="qr-wrap" style="max-width:340px;border-color:#4caf50">
    <video id="foto-video" autoplay playsinline muted style="width:100%;display:block"></video>
    <canvas id="foto-canvas" style="display:none"></canvas>
  </div>
  <img id="foto-preview" alt="foto capturada">
  <button class="btn btn-green" onclick="capturarFoto()">📸 Tomar foto</button>
  <button class="btn btn-gold" id="btn-guardar" onclick="guardarFoto()" disabled>☁️ Subir foto</button>
  <div class="progress" id="progress-wrap"><div class="progress-bar" id="progress-bar"></div></div>
  <div class="status" id="foto-status"></div>
  <div class="counter">Subidas esta sesión: <span id="contador">0</span></div>
  <hr class="divider">
  <button class="btn btn-blue" onclick="nuevoEscaneo()">🔍 Escanear otro QR</button>
  <button class="btn btn-gray" onclick="nuevoEscaneo()" style="margin-top:-6px;font-size:.82em;padding:10px">↩ Volver sin guardar</button>
</div>

<script>
// ── CONFIG CLOUDINARY ──
var CL_CLOUD  = "dgcyeqydo";
var CL_PRESET = "ormzxoez";
var CL_FOLDER = "bamf2026";

// ── UTILIDADES ──
function sanitizar(str){
  return String(str||"")
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/[ñ]/g,"n").replace(/[Ñ]/g,"N")
    .replace(/[\\/:*?"<>|]/g,"")
    .replace(/\s+/g," ").trim();
}
function padNum(n,d){ return String(parseInt(n)||0).padStart(d,"0"); }
function buildFilename(ord,mod){ return padNum(ord,3)+" "+sanitizar(mod); }
function parseQR(texto){
  texto=texto.trim();
  var sp=texto.indexOf(" ");
  if(sp<0) return null;
  var ord=texto.substring(0,sp).trim();
  var mod=texto.substring(sp+1).trim();
  if(!ord||!mod||isNaN(parseInt(ord))) return null;
  return {ord:ord,mod:mod};
}

// ── ACTUALIZAR ÍNDICE JSON EN CLOUDINARY ──
async function actualizarIndice(publicId){
  // Leer índice actual — busca el más reciente
  var lista=[];
  var indexBase="https://res.cloudinary.com/"+CL_CLOUD+"/raw/upload/"+CL_FOLDER+"/fotos_index";
  try {
    var r=await fetch(indexBase+".json?t="+Date.now());
    if(r.ok) lista=await r.json();
  } catch(e){ lista=[]; }

  if(!lista.includes(publicId)) lista.push(publicId);
  lista.sort();

  // Subir con timestamp en el nombre para evitar el problema de overwrite
  var ts=Date.now();
  var blob=new Blob([JSON.stringify(lista)],{type:"application/json"});
  var fd=new FormData();
  fd.append("file", blob, "fotos_index.json");
  fd.append("upload_preset", CL_PRESET);
  fd.append("folder", CL_FOLDER);
  fd.append("public_id", "fotos_index_"+ts);
  try {
    await fetch("https://api.cloudinary.com/v1_1/"+CL_CLOUD+"/raw/upload",{method:"POST",body:fd});
    // También intentar reemplazar el principal
    var fd2=new FormData();
    fd2.append("file", blob, "fotos_index.json");
    fd2.append("upload_preset", CL_PRESET);
    fd2.append("folder", CL_FOLDER);
    fd2.append("public_id", "fotos_index");
    await fetch("https://api.cloudinary.com/v1_1/"+CL_CLOUD+"/raw/upload",{method:"POST",body:fd2});
  } catch(e){ console.warn("Índice no actualizado:",e); }
}

// ── SUBIR A CLOUDINARY ──
async function subirACloudinary(blob, filename){
  var fotoStatus=document.getElementById("foto-status");
  var progressWrap=document.getElementById("progress-wrap");
  var progressBar=document.getElementById("progress-bar");

  fotoStatus.textContent="☁️ Subiendo foto...";
  fotoStatus.className="status uploading";
  progressWrap.style.display="block";
  progressBar.style.width="30%";

  var formData=new FormData();
  formData.append("file", blob, filename+".jpg");
  formData.append("upload_preset", CL_PRESET);
  formData.append("folder", CL_FOLDER);
  formData.append("public_id", filename);
  formData.append("tags", "bamf2026"); // tag para poder listar

  try {
    var resp=await fetch("https://api.cloudinary.com/v1_1/"+CL_CLOUD+"/image/upload", {
      method:"POST",
      body:formData
    });
    progressBar.style.width="100%";
    var data=await resp.json();
    if(resp.ok && data.secure_url){
      // Actualizar índice JSON
      await actualizarIndice(CL_FOLDER+"/"+filename);
      fotoStatus.textContent="✅ Subida: "+filename;
      fotoStatus.className="status ok";
      setTimeout(function(){ progressWrap.style.display="none"; progressBar.style.width="0%"; },1500);
      return true;
    } else {
      fotoStatus.textContent="⚠️ Error: "+(data.error&&data.error.message||resp.status);
      fotoStatus.className="status err";
      progressWrap.style.display="none";
      return false;
    }
  } catch(e){
    fotoStatus.textContent="⚠️ Error de red: "+e.message;
    fotoStatus.className="status err";
    progressWrap.style.display="none";
    return false;
  }
}

// ── ESTADO GLOBAL ──
var currentOrd="",currentMod="",currentFilename="";
var fotoBlob=null,fotosCount=0,fotoStream=null;
var codeReader=null;
var scanStatus=document.getElementById("scan-status");
var yaEscaneados=new Set();

function showScreen(id){
  document.querySelectorAll(".screen").forEach(function(s){s.classList.remove("active");});
  document.getElementById(id).classList.add("active");
}

// ── ZXING QR READER ──
function iniciarEscaneo(){
  scanStatus.textContent="Buscando QR...";
  scanStatus.className="status";
  try {
    codeReader=new ZXing.BrowserQRCodeReader();
    codeReader.decodeFromVideoDevice(null,"qr-video",function(result,err){
      if(result){
        var texto=result.getText();
        var parsed=parseQR(texto);
        if(parsed){
          var key=padNum(parsed.ord,3);
          if(yaEscaneados.has(key)){
            scanStatus.textContent="⚠️ #"+key+" ya fue fotografiado";
            scanStatus.className="status err";
            return;
          }
          detenerEscaneo();
          onQRDetectado(parsed.ord,parsed.mod);
        } else {
          scanStatus.textContent="⚠️ Formato incorrecto: ["+texto+"]";
          scanStatus.className="status err";
        }
      }
    }).then(function(){
      scanStatus.textContent="Buscando QR...";
      scanStatus.className="status";
    }).catch(function(e){
      scanStatus.textContent="⚠️ Cámara: "+e.message;
      scanStatus.className="status err";
    });
  } catch(e){
    scanStatus.textContent="⚠️ Error: "+e.message;
    scanStatus.className="status err";
  }
}

function detenerEscaneo(){
  if(codeReader){ try{codeReader.reset();}catch(e){} codeReader=null; }
}

function onQRDetectado(ord,mod){
  currentOrd=ord; currentMod=mod; currentFilename=buildFilename(ord,mod);
  document.getElementById("disp-num").textContent="#"+padNum(ord,3);
  document.getElementById("disp-mod").textContent=mod;
  document.getElementById("disp-fname").textContent="💾 "+currentFilename+".jpg";
  fotoBlob=null;
  document.getElementById("foto-preview").style.display="none";
  document.getElementById("btn-guardar").disabled=true;
  document.getElementById("foto-status").textContent="";
  showScreen("screen-foto");
  iniciarCamaraFoto();
}

function ingresarManual(){
  var ord=document.getElementById("inp-ord").value.trim();
  var mod=document.getElementById("inp-mod").value.trim();
  if(!ord||!mod){ scanStatus.textContent="⚠️ Completá N° y nombre"; scanStatus.className="status err"; return; }
  detenerEscaneo();
  onQRDetectado(ord,mod);
}

// ── CÁMARA FOTO ──
var fotoVideo=document.getElementById("foto-video");
var fotoCanvas=document.getElementById("foto-canvas");
var fotoCtx=fotoCanvas.getContext("2d");

function iniciarCamaraFoto(){
  if(fotoStream) return;
  navigator.mediaDevices.getUserMedia({video:{facingMode:"environment",width:{ideal:3840},height:{ideal:2160}}})
  .then(function(stream){
    fotoStream=stream; fotoVideo.srcObject=stream; fotoVideo.play();
    document.getElementById("foto-status").textContent="Cámara lista — encuadrá el modelo";
    document.getElementById("foto-status").className="status ok";
  }).catch(function(e){
    document.getElementById("foto-status").textContent="⚠️ Cámara: "+e.message;
    document.getElementById("foto-status").className="status err";
  });
}

function detenerCamaraFoto(){
  if(fotoStream){fotoStream.getTracks().forEach(function(t){t.stop();});fotoStream=null;}
  fotoVideo.srcObject=null;
}

function capturarFoto(){
  if(!fotoStream||fotoVideo.readyState!==fotoVideo.HAVE_ENOUGH_DATA){
    document.getElementById("foto-status").textContent="⚠️ Cámara no lista";
    document.getElementById("foto-status").className="status err"; return;
  }
  fotoCanvas.width=fotoVideo.videoWidth; fotoCanvas.height=fotoVideo.videoHeight;
  fotoCtx.drawImage(fotoVideo,0,0);
  fotoCanvas.toBlob(function(blob){
    fotoBlob=blob;
    var url=URL.createObjectURL(blob);
    var prev=document.getElementById("foto-preview");
    prev.src=url; prev.style.display="block";
    document.getElementById("btn-guardar").disabled=false;
    document.getElementById("foto-status").textContent="✓ Foto lista — presioná Subir";
    document.getElementById("foto-status").className="status ok";
  },"image/jpeg",0.92);
}

async function guardarFoto(){
  if(!fotoBlob) return;
  document.getElementById("btn-guardar").disabled=true;
  var ok=await subirACloudinary(fotoBlob, currentFilename);
  if(ok){
    yaEscaneados.add(padNum(currentOrd,3));
    var divYa=document.getElementById("scan-ya");
    if(divYa) divYa.textContent="✓ Fotografiados: "+Array.from(yaEscaneados).join(", ");
    fotosCount++;
    document.getElementById("contador").textContent=fotosCount;
    setTimeout(nuevoEscaneo,2000);
  } else {
    // fallback: descarga local
    var url=URL.createObjectURL(fotoBlob);
    var a=document.createElement("a");
    a.href=url; a.download=currentFilename+".jpg";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(url);},2000);
    document.getElementById("btn-guardar").disabled=false;
  }
}

function nuevoEscaneo(){
  detenerCamaraFoto(); fotoBlob=null;
  document.getElementById("foto-preview").style.display="none";
  document.getElementById("inp-ord").value="";
  document.getElementById("inp-mod").value="";
  showScreen("screen-scan");
  iniciarEscaneo();
}

iniciarEscaneo();
</script>
</body>
</html>
